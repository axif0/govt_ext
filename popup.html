<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Teletalk Form Fill</title>
  <style>
    body { width: 300px; margin: 0; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; }
    h1 { font-size: 16px; margin: 0 0 10px; color: #007a3d; }
    #statusBox { font-size: 13px; line-height: 1.45; padding: 10px 12px; background: #f4faf6; border-radius: 8px; border-left: 3px solid #007a3d; margin-bottom: 12px; color: #333; }
    #statusBox.empty { background: #fafafa; border-left-color: #ccc; color: #666; }
    #statusBox strong { color: #007a3d; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    button { padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    #saveBtn { background: #fff; color: #007a3d; box-shadow: inset 0 0 0 1.5px #007a3d; }
    #fillBtn { background: #f1db2c; color: #1a1a1a; }
    #fillBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    a { color: #007a3d; font-size: 13px; }
    #msg { font-size: 12px; color: #666; margin-top: 8px; min-height: 18px; }
  </style>
</head>
<body>
  <h1>Teletalk Form Fill</h1>
  <div id="statusBox">Loading…</div>
  <div class="actions">
    <button type="button" id="saveBtn">Save Form</button>
    <button type="button" id="fillBtn">Auto Fill</button>
  </div>
  <p id="msg"></p>
  <a href="#" id="optionsLink">Settings / Import / Export</a>
  <script src="lib/match.js"></script>
  <script src="popup.js"></script>
</body>
</html>
