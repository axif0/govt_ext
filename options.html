<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Teletalk Form Fill — Settings</title>
  <style>
    body { max-width: 820px; margin: 24px auto; padding: 0 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; color: #222; }
    h1 { color: #006633; font-size: 22px; }
    h2 { font-size: 16px; margin-top: 24px; }
    .note { background: #f5f5f5; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 13px; line-height: 1.5; }
    label { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    #searchKeys { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
    #profileTable { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
    #profileTable th, #profileTable td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; vertical-align: top; }
    #profileTable th { background: #f4faf6; color: #006633; }
    #profileTable tr:nth-child(even) { background: #fafafa; }
    #profileTableWrap { max-height: 280px; overflow-y: auto; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 16px; }
    textarea { width: 100%; height: 240px; font-family: monospace; font-size: 12px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    button, .file-btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; background: #006633; color: #fff; }
    button.secondary { background: #555; }
    #status { margin-top: 12px; color: #006633; font-weight: 600; }
    input[type="file"] { display: none; }
    .empty-table { padding: 16px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <h1>Teletalk Form Fill — Settings</h1>
  <p class="note">
    Not affiliated with Teletalk or the Government of Bangladesh.
    All data stays in your browser. You are responsible for accuracy before submitting applications.
  </p>

  <label>
    <input type="checkbox" id="autoFillOnLoad">
    Auto Fill when page loads (Teletalk sites only)
  </label>

  <h2>Saved fields</h2>
  <input type="search" id="searchKeys" placeholder="Search field names or values…">
  <div id="profileTableWrap">
    <table id="profileTable">
      <thead><tr><th>Field</th><th>Value</th></tr></thead>
      <tbody id="profileTableBody"></tbody>
    </table>
  </div>

  <h2>Raw JSON</h2>
  <textarea id="profileJson" spellcheck="false"></textarea>

  <div class="actions">
    <button type="button" id="saveBtn">Save changes</button>
    <button type="button" id="exportBtn" class="secondary">Export JSON</button>
    <label class="file-btn" for="importFile">Import JSON</label>
    <input type="file" id="importFile" accept=".json,application/json">
    <button type="button" id="clearBtn" class="secondary">Clear all data</button>
  </div>

  <p id="status"></p>
  <script src="lib/match.js"></script>
  <script src="options.js"></script>
</body>
</html>
